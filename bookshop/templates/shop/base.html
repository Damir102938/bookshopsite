{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>{% block title %}BookShop{% endblock %}</title>
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
</head>
<body>
    <div id="header">
        <a href="/" class="logo">BookShop</a>
    </div>

    <div id="subheader">
        <div class="search">
        <form action="{% url 'shop:book_search' %}" method="get">
            <input type="text" name="query" placeholder="Поиск книг..." value="{{ request.GET.query }}">
            <input type="submit" value="Найти">
        </form>
        </div>

        <div class="cart">
            {% with total_items=cart|length %}
                {% if total_items > 0 %}
                    Ваша корзина:
                    <a href="{% url 'cart:cart_detail' %}">
                        Товаров ({{ total_items }}),
                        {{ cart.get_total_price }} руб.
                    </a>
                {% else %}
                    Ваша корзина пуста.
                {% endif %}
            {% endwith %}
        </div>
    </div>

    <div id="content">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
